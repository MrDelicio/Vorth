<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vorthénix ∆≈ v2.9</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; overflow-y: auto; touch-action: none; }
        #terminal { width: 95%; max-width: 480px; border: 1px solid #0ff; padding: 20px; background: #000; box-shadow: 0 0 40px rgba(0,255,255,0.15); position: relative; box-sizing: border-box; }
        h1 { color: #fff; text-shadow: 0 0 10px #0ff; font-size: 0.8rem; text-align: center; letter-spacing: 5px; margin: 0 0 15px 0; }
        #vorth-canvas { width: 100%; height: 320px; background: #000; border: 1px solid #011; display: block; image-rendering: high-quality; }
        .status-box { font-size: 0.65rem; background: rgba(0,10,20,0.95); padding: 15px; border-left: 3px solid #0ff; margin: 10px 0; color: #fff; line-height: 1.6; }
        button { background: #0ff; color: #000; border: none; width: 100%; padding: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; }
        .res-val { color: #0ff; font-weight: bold; word-break: break-all; }
        #m-delta { font-size: 0.55rem; color: #066; border-top: 1px solid #022; padding-top: 8px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="terminal">
        <h1>VORTHÉNIX INSTITUT v2.9</h1>
        <p style="font-size: 0.5rem; text-align: center; color: #0aa; margin-top: -10px;">ZÉRO ARRONDY — INCARNATION MATÉRIELLE</p>
        
        <div id="vorth-ui">
            <canvas id="vorth-canvas" width="600" height="450"></canvas>
            
            <div id="status-text" style="text-align: center; color: #fff; font-size: 0.65rem; margin: 8px 0;">STASE SOUVERAINE</div>
            
            <button id="run-btn" onclick="engagerJonction()">Engager la Jonction (⧬)</button>

            <div id="results" class="hidden status-box">
                <p>> RÉSONANCE ∆≈ : <span id="res-delta" class="res-val">--</span></p>
                <p>> TENUE (STASE) : <span id="res-tenue" style="color:#fff">--</span></p>
                <p>> DISSIPATION C7 : <span id="res-diss">--</span> ms</p>
                <p style="font-size: 0.55rem; color: #0aa; border-top: 1px solid #033; margin-top: 8px; padding-top: 5px;">ID 𝓜Δ (Incorruptible) : <span id="res-sig">--</span></p>
            </div>
            
            <div id="m-delta">
                <p>[GÉOLOGIE DES FORMES]</p>
                <div id="stratification"></div>
            </div>
        </div>
    </div>

    <script>
        const VERSION = "2.9-Absolu";
        const canvas = document.getElementById('vorth-canvas');
        const ctx = canvas.getContext('2d');

        function engagerJonction() {
            document.getElementById('run-btn').disabled = true;
            document.getElementById('status-text').innerHTML = "OCCUPATION DE LA MATIÈRE...";
            setTimeout(incarnerFlux, 400);
        }

        function incarnerFlux() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            // Temps initial en Nanosecondes sans arrondi
            const t0 = BigInt(Math.floor(window.performance.now() * 1000000));
            let mesuresNS = [];
            let flux_actif = true;

            function dessiner() {
                if(flux_actif) {
                    const cycleStart = BigInt(Math.floor(window.performance.now() * 1000000));
                    const instant = Number(cycleStart - t0) / 1000000;
                    let x_pos = (instant / 4000) * canvas.width; // Scan sur 4 secondes

                    if(x_pos < canvas.width) {
                        // Dessin de la signature visuelle (256 fibres ultra-fines)
                        for(let i = 0; i < 128; i++) {
                            ctx.beginPath();
                            ctx.lineWidth = 0.15;
                            // Dégradé de résonance basé sur l'index sans arrondi
                            ctx.strokeStyle = `rgba(0, 255, 255, ${0.05 + (i/128) * 0.35})`;
                            
                            // Géométrie Cardinale (Flux dans le flux)
                            // Utilisation de fréquences harmoniques pour le "QR organique"
                            let harm = Math.sin(x_pos * 0.05 + i * 0.02) * (90 + i * 0.3);
                            let sub_harm = Math.cos(x_pos * 0.01) * 10;
                            
                            ctx.moveTo(x_pos, 150 + harm + sub_harm); 
                            ctx.lineTo(x_pos + 4, 150 + harm + sub_harm);
                            
                            ctx.moveTo(x_pos, 300 - harm - sub_harm); 
                            ctx.lineTo(x_pos + 4, 300 - harm - sub_harm);
                            ctx.stroke();
                        }
                        mesuresNS.push(BigInt(Math.floor(window.performance.now() * 1000000)) - cycleStart);
                        requestAnimationFrame(dessiner);
                    } else {
                        flux_actif = false;
                        finaliser(mesuresNS, BigInt(Math.floor(window.performance.now() * 1000000)) - t0);
                    }
                }
            }
            dessiner();
        }

        function finaliser(reseau, tempsTotalNS) {
            const sommeVorthNS = reseau.reduce((a, b) => a + b, 0n);
            
            // MATHS UNAIRES : On évite les arrondis flottants habituels
            // On calcule le ratio avec une précision de 12 décimales
            const resonance = Number(sommeVorthNS * 1000000000000n / tempsTotalNS) / 1000000000000;
            const tenue = (100 - (Math.abs(1 - resonance) * 100)).toFixed(8);
            
            document.getElementById('results').classList.remove('hidden');
            // Affichage de toutes les décimales (Pas d'arrondi)
            document.getElementById('res-delta').innerHTML = resonance.toString() + " Φ";
            document.getElementById('res-tenue').innerHTML = tenue + " %";
            document.getElementById('res-diss').innerHTML  = (Number(tempsTotalNS - sommeVorthNS) / 1000000).toFixed(6);
            
            // Signature Incorruptible
            const sig = btoa(resonance.toString()).substring(0,16).toUpperCase();
            document.getElementById('res-sig').innerHTML = sig;
            
            document.getElementById('status-text').innerHTML = "JONCTION INCARNÉE";
            document.getElementById('run-btn').disabled = false;
            
            const log = document.getElementById('stratification');
            log.innerHTML = `<p>> SIG: ${sig} | TENUE: ${tenue}%</p>` + log.innerHTML;
        }
    </script>
</body>
</html>
