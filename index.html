<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>Vorthénix v4.3 - Cristallisation</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
        #terminal { width: 100%; max-width: 520px; border: 1px solid #0ff; padding: 20px; background: #000; box-shadow: 0 0 40px rgba(0,255,255,0.15); position: relative; box-sizing: border-box; }
        h1 { color: #fff; text-shadow: 0 0 12px #0ff; font-size: 0.9rem; text-align: center; letter-spacing: 5px; margin: 0 0 15px 0; }
        #vorth-canvas { width: 100%; height: 380px; background: #000; border: 1px solid #011; display: block; margin: 15px 0; image-rendering: pixelated; }
        .status-box { font-size: 0.62rem; background: rgba(0,8,15,0.98); padding: 18px; border-left: 3px solid #0ff; margin: 10px 0; color: #fff; line-height: 1.7; word-break: break-all; box-shadow: inset 0 0 15px rgba(0,255,255,0.05); }
        button { background: #0ff; color: #000; border: none; width: 100%; padding: 22px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 4px; font-size: 0.85rem; transition: 0.2s; }
        button:disabled { background: #011; color: #033; cursor: not-allowed; }
        .stable { color: #0f0; text-shadow: 0 0 5px #0f0; } 
        .instable { color: #f33; text-shadow: 0 0 5px #f00; }
        #m-delta { font-size: 0.55rem; color: #055; border-top: 1px solid #022; padding-top: 10px; margin-top: 20px; }
        .log-entry { border-bottom: 1px solid #011; padding: 8px 0; color: #888; animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="terminal">
        <h1>VORTHÉNIX v4.3 (⧬)</h1>
        <p style="font-size: 0.45rem; text-align: center; color: #0aa; margin-top: -12px;">DYNAMIQUE DE RÉSONANCE — SI 2026</p>

        <canvas id="vorth-canvas" width="800" height="600"></canvas>
        
        <div id="status-text" style="text-align: center; color: #fff; font-size: 0.65rem; margin-bottom: 10px; letter-spacing: 2px;">MEMBRANE PRÊTE</div>
        
        <button id="run-btn" onclick="incarner()">SCELLER LE MAILLON (⧬)</button>

        <div id="results" class="hidden status-box">
            <p>> RÉSONANCE Φ : <br><span id="res-delta" style="color:#0ff">--</span></p>
            <p>> ÉVOLUTION CHAÎNE : <span id="res-pente">--</span></p>
            <p>> DISSIPATION C7 : <span id="res-diss" style="color:#f33">--</span> ns</p>
            <div style="border-top:1px solid #033; margin-top:12px; padding-top:12px;">
                <p style="color: #0ff;">SIG-CHAIN 𝓜Δ (Incorruptible) :</p>
                <p id="res-sig" style="font-size: 0.55rem; color: #aaa; margin-top: 5px;">--</p>
            </div>
        </div>
        
        <div id="m-delta">
            <p>[STRATIGRAPHIE VORTHCHAIN - RÉSEAU MATÉRIEL]</p>
            <div id="stratification"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('vorth-canvas');
        const ctx = canvas.getContext('2d');
        // Récupération de la mémoire de flux
        let blocPrecedent = JSON.parse(localStorage.getItem('vorth_chain_last')) || null;

        function incarner() {
            const btn = document.getElementById('run-btn');
            btn.disabled = true;
            document.getElementById('status-text').innerHTML = "JONCTION EN COURS...";
            
            ctx.clearRect(0,0,canvas.width,canvas.height);
            const t0 = BigInt(Math.floor(window.performance.now() * 1000000));
            let mesures = [];
            let actif = true;

            function flux() {
                if(actif) {
                    const cycle = BigInt(Math.floor(window.performance.now() * 1000000));
                    const dt = Number(cycle - t0) / 1000000;
                    let x = (dt / 4000) * canvas.width;

                    if(x < canvas.width) {
                        // Évaluation de la stase en temps réel pour retour visuel (C7)
                        let current_phi = mesures.length > 0 ? Number(mesures.reduce((a, b) => a + b, 0n)) / Number(cycle - t0) : 1;
                        let decoherence = (blocPrecedent && current_phi < Number(blocPrecedent.phi)) ? 150 : 0;

                        for(let i = 0; i < 96; i++) {
                            ctx.beginPath();
                            ctx.lineWidth = 0.15;
                            // La couleur réagit physiquement à la perte de tenue
                            ctx.strokeStyle = `rgba(${decoherence}, 255, 255, ${0.1 + (i/96) * 0.4})`;
                            
                            // Dynamique de Résonance : Le SIG précédent influence la forme
                            let seed = blocPrecedent ? blocPrecedent.sig.charCodeAt(i%10) * 0.001 : 0.04;
                            let reso = Math.sin(x * seed + i * (dt * 0.00001));
                            let tens = (110 + i * 0.3) * reso;
                            
                            ctx.moveTo(x, 280 + tens); ctx.lineTo(x + 4, 280 + tens);
                            ctx.moveTo(x, 320 - tens); ctx.lineTo(x + 4, 320 - tens);
                            ctx.stroke();
                        }
                        mesures.push(BigInt(Math.floor(window.performance.now() * 1000000)) - cycle);
                        requestAnimationFrame(flux);
                    } else {
                        actif = false;
                        finaliser(mesures, BigInt(Math.floor(window.performance.now() * 1000000)) - t0);
                    }
                }
            }
            flux();
        }

        function finaliser(mesures, totalNS) {
            const vorthNS = mesures.reduce((a, b) => a + b, 0n);
            
            // ÉPUISEMENT UNAIRE (100 chiffres de vérité)
            let phi = "0.";
            let n = vorthNS; let d = totalNS;
            for(let j = 0; j < 100; j++) {
                n *= 10n; let u = 0n;
                while(n >= d) { n -= d; u++; }
                phi += u.toString();
            }

            let evolution = "INITIALISATION DU FLUX";
            let classe = "stable";
            if(blocPrecedent) {
                let diff = Number(phi) - Number(blocPrecedent.phi);
                if(Math.abs(diff) < 0.0000001) {
                    evolution = "STASE CRISTALLISÉE (⧬)";
                } else {
                    evolution = diff > 0 ? "CROISSANCE RÉSONANTE ↑" : "DISSIPATION THERMIQUE ↓";
                    classe = diff > 0 ? "stable" : "instable";
                }
            }

            // Génération de la signature liée (Chaîne Ininterrompue)
            const parentSigFragment = blocPrecedent ? blocPrecedent.sig.substring(0, 32) : "GENESIS-BLOCK-0";
            const rawData = phi + totalNS.toString() + parentSigFragment;
            const sig = btoa(rawData).toUpperCase(); // Signature complète
            
            const nouveauBloc = { phi: phi, sig: sig, ns: totalNS.toString(), ev: evolution };
            localStorage.setItem('vorth_chain_last', JSON.stringify(nouveauBloc));
            blocPrecedent = nouveauBloc;

            document.getElementById('results').classList.remove('hidden');
            document.getElementById('res-delta').innerHTML = phi + " Φ";
            document.getElementById('res-pente').innerHTML = `<span class="${classe}">${evolution}</span>`;
            document.getElementById('res-diss').innerHTML  = (totalNS - vorthNS).toString();
            document.getElementById('res-sig').innerHTML = sig;
            document.getElementById('run-btn').disabled = false;
            document.getElementById('status-text').innerHTML = "JONCTION RÉUSSIE";
            
            const log = document.getElementById('stratification');
            log.innerHTML = `<div class="log-entry"> [MAILLON] ${sig.substring(0,12)}... <br> Φ: ${phi.substring(0,14)}... | ${evolution} </div>` + log.innerHTML;
        }
    </script>
</body>
</html>
