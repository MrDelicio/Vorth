<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vorthénix OS</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { 
            background: #000; color: #0f0; font-family: 'Courier New', monospace; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }
        #terminal { 
            width: 85%; max-width: 420px; border: 1px solid #0f0; padding: 25px; 
            background: rgba(0, 15, 0, 0.95); box-shadow: 0 0 20px #0f0; position: relative; 
            border-radius: 5px; z-index: 5;
        }
        h1 { color: #fff; text-shadow: 0 0 10px #0f0; font-size: 1.1rem; text-align: center; margin: 0 0 15px 0; letter-spacing: 2px; }
        .line { border-bottom: 1px solid #0f0; margin: 15px 0; opacity: 0.4; }
        input { background: #000; border: 1px solid #0f0; color: #fff; width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box; outline: none; font-size: 1rem; }
        button { background: #0f0; color: #000; border: none; width: 100%; padding: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        button:active { background: #fff; }
        .hidden { display: none !important; }
        #vorth-canvas { width: 100%; height: 120px; border: 1px solid #040; background: #000; margin: 15px 0; display: block; }
        .status { font-size: 0.7rem; color: #0f0; margin-bottom: 8px; font-weight: bold; }
        .logout { background: #600; color: #fff; margin-top: 25px; font-size: 0.7rem; opacity: 0.8; }
        
        /* Effet de scanline Vorth */
        #terminal::after { 
            content: " "; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); 
            z-index: 10; pointer-events: none; background-size: 100% 2px, 3px 100%; 
        }
    </style>
</head>
<body>

    <div id="terminal">
        <h1>INSTITUT VORTHÉNIX v1.7</h1>
        <div class="line"></div>
        
        <div id="setup-section" class="hidden">
            <p class="status">> DÉTECTION : SYSTÈME VIERGE</p>
            <p style="font-size: 0.7rem;">Génération de l'identité orthosymétrique...</p>
            <input type="text" id="new-username" placeholder="NOM DE L'OPÉRATEUR">
            <input type="password" id="new-password" placeholder="CLÉ PRIVÉE i128i128">
            <button onclick="handleSetup()">CRÉER MON ACCÈS</button>
        </div>

        <div id="login-section" class="hidden">
            <p class="status">> OPÉRATEUR : <span id="user-detected" style="color:#fff"></span></p>
            <p style="font-size: 0.7rem;">Vérification de l'équilibre i128...</p>
            <input type="password" id="login-password" placeholder="ENTREZ VOTRE CLÉ">
            <button onclick="handleLogin()">DÉVERROUILLAGE</button>
        </div>

        <div id="user-menu" class="hidden">
            <p class="status">> ÉTAT : ORTHOSYMÉTRIQUE TOTAL</p>
            <p style="font-size: 0.7rem;">Opérateur : <span id="display-name" style="color:#fff"></span></p>
            <div class="line"></div>
            
            <label style="font-size: 0.7rem;">IMPULSION i128i128:</label>
            <input type="number" id="energy-input" value="128">
            <button onclick="runVorthSim()">LANCER LA PREUVE</button>
            
            <div id="sim-result" class="hidden">
                <canvas id="vorth-canvas" width="350" height="120"></canvas>
                <p id="calc-result" style="font-size: 0.75rem; color: #fff; background: rgba(0,50,0,0.5); padding: 5px;"></p>
            </div>

            <button onclick="logout()" class="logout">RÉINITIALISER LE NOEUD</button>
        </div>
    </div>

    <script>
        const VER = "1.7";

        // MOTEUR DE CRYPTAGE ORTHOSYMÉTRIQUE
        async function vorthEncrypt(data) {
            let left = "", right = "";
            const mid = Math.ceil(data.length / 2);
            for (let i = 0; i < data.length; i++) {
                let val = (data.charCodeAt(i) * 128) ^ (i + 128);
                if (i < mid) left += val.toString(16);
                else right = val.toString(16) + right; // Inversion pour symétrie
            }
            return "vorth_" + left + "x" + right;
        }

        window.onload = function() {
            if (localStorage.getItem('vorth_ver_final') !== VER) {
                localStorage.clear();
                localStorage.setItem('vorth_ver_final', VER);
                location.reload();
                return;
            }
            const name = localStorage.getItem('vorth_name');
            if (name) {
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('user-detected').innerText = name.toUpperCase();
            } else {
                document.getElementById('setup-section').classList.remove('hidden');
            }
        };

        async function handleSetup() {
            const n = document.getElementById('new-username').value.trim();
            const p = document.getElementById('new-password').value;
            if (n && p) {
                localStorage.setItem('vorth_name', n);
                localStorage.setItem('vorth_key', await vorthEncrypt(p));
                location.reload();
            }
        }

        async function handleLogin() {
            const p = document.getElementById('login-password').value;
            const s = localStorage.getItem('vorth_key');
            if (await vorthEncrypt(p) === s) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('user-menu').classList.remove('hidden');
                document.getElementById('display-name').innerText = localStorage.getItem('vorth_name').toUpperCase();
            } else { alert("DÉFAUT DE SYMÉTRIE : ACCÈS REFUSÉ"); }
        }

        function runVorthSim() {
            const e = document.getElementById('energy-input').value;
            document.getElementById('sim-result').classList.remove('hidden');
            const c = document.getElementById('vorth-canvas');
            const ctx = c.getContext('2d');
            ctx.clearRect(0,0,c.width,c.height);
            let x = 0;
            
            function anim() {
                if(x < c.width) {
                    ctx.beginPath();
                    ctx.strokeStyle = '#0f0';
                    ctx.lineWidth = 2;
                    ctx.shadowBlur = 4;
                    ctx.shadowColor = '#0f0';
                    
                    // Dessin des deux flux en miroir (Orthosymétrie)
                    ctx.moveTo(x, 40 + Math.sin(x * 0.1) * (e / 10));
                    ctx.lineTo(x + 4, 40 + Math.sin((x+4) * 0.1) * (e / 10));
                    
                    ctx.moveTo(x, 80 - Math.sin(x * 0.1) * (e / 10));
                    ctx.lineTo(x + 4, 80 - Math.sin((x+4) * 0.1) * (e / 10));
                    
                    x += 4;
                    ctx.stroke();
                    requestAnimationFrame(anim);
                } else {
                    document.getElementById('calc-result').innerHTML = "> ÉQUILIBRE i128i128 VALIDÉ.<br>> ÉTAT DU MOUVEMENT : SOUVERAIN.";
                }
            }
            anim();
        }

        function logout() { if(confirm("RÉINITIALISER LE SYSTÈME ?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
