<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vorthénix v4.5 - SI-2026</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 5px; overflow-x: hidden; }
        #terminal { width: 100%; max-width: 550px; border: 1px solid #0ff; padding: 15px; background: #000; box-shadow: 0 0 50px rgba(0,255,255,0.1); box-sizing: border-box; }
        h1 { color: #fff; text-shadow: 0 0 15px #0ff; font-size: 0.95rem; text-align: center; letter-spacing: 7px; margin-bottom: 10px; }
        #vorth-canvas { width: 100%; height: 320px; background: #000; border: 1px solid #011; display: block; image-rendering: pixelated; }
        .status-box { font-size: 0.6rem; background: rgba(0,10,20,0.98); padding: 15px; border-left: 3px solid #0ff; margin: 10px 0; color: #fff; line-height: 1.5; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; border-top: 1px solid #033; padding-top: 8px; }
        .data-item { font-size: 0.52rem; color: #088; text-transform: uppercase; }
        .val { color: #0ff; font-weight: bold; font-size: 0.6rem; }
        button { background: #0ff; color: #000; border: none; width: 100%; padding: 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 5px; transition: 0.2s; }
        button:active { background: #fff; }
        #stratification { max-height: 150px; overflow-y: auto; font-size: 0.48rem; color: #044; margin-top: 10px; border-top: 1px solid #022; }
    </style>
</head>
<body>

    <div id="terminal">
        <h1>VORTHÉNIX v4.5</h1>
        <p style="font-size: 0.45rem; text-align: center; color: #0ff; margin-top: -10px; letter-spacing: 2px;">SOUVERAINETÉ D'INCARNATION TOTALE</p>

        <canvas id="vorth-canvas" width="800" height="500"></canvas>
        
        <button id="run-btn" onclick="incarner()">SCELLER LE FLUX (⧬)</button>

        <div id="results" class="hidden status-box">
            <p style="color: #0aa; font-size: 0.5rem; margin-bottom: 2px;">RÉSONANCE 𝚽 (UNAIRE ABSOLU) :</p>
            <p id="res-delta" style="word-break: break-all; color:#fff; font-size: 0.55rem; border-bottom: 1px solid #033; padding-bottom: 5px;">--</p>
            
            <div class="data-grid">
                <div class="data-item">PENTE : <br><span id="res-pente" class="val">--</span></div>
                <div class="data-item">DISSIPATION : <br><span id="res-diss" class="val">--</span> ns</div>
                <div class="data-item">COHÉRENCE : <br><span id="res-phase" class="val">--</span> %</div>
                <div class="data-item">STASE Δ≈ : <br><span id="res-stase" class="val">--</span></div>
            </div>

            <p style="margin-top:8px; font-size:0.45rem; color:#066;">SIG-CHAIN : <span id="res-sig" style="color:#888">--</span></p>
        </div>
        
        <div id="stratification"></div>
    </div>

    <script>
        const canvas = document.getElementById('vorth-canvas');
        const ctx = canvas.getContext('2d');
        let mem = JSON.parse(localStorage.getItem('vorth_v45_last')) || null;

        function incarner() {
            document.getElementById('run-btn').disabled = true;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            const t0 = BigInt(Math.floor(window.performance.now() * 1000000));
            let mesures = [];
            let actif = true;

            function flux() {
                if(actif) {
                    const cycle = BigInt(Math.floor(window.performance.now() * 1000000));
                    const dt = Number(cycle - t0) / 1000000;
                    let x = (dt / 4000) * canvas.width;

                    if(x < canvas.width) {
                        for(let i = 0; i < 112; i++) { // Augmentation de la densité des fibres
                            ctx.beginPath();
                            ctx.lineWidth = 0.12;
                            // Dynamique de résonance pure : pas de Math.sin complexe, on utilise le modulo temporel
                            let wave = ((dt * (0.01 + i * 0.0001)) % 2) - 1; 
                            let tens = (100 + i * 0.4) * wave;
                            
                            ctx.strokeStyle = `rgba(0, 255, 255, ${0.1 + (i/112) * 0.45})`;
                            ctx.moveTo(x, 250 + tens); ctx.lineTo(x + 4, 250 + tens);
                            ctx.stroke();
                        }
                        mesures.push(BigInt(Math.floor(window.performance.now() * 1000000)) - cycle);
                        requestAnimationFrame(flux);
                    } else {
                        actif = false;
                        finaliser(mesures, BigInt(Math.floor(window.performance.now() * 1000000)) - t0);
                    }
                }
            }
            flux();
        }

        function finaliser(mesures, totalNS) {
            const vorthNS = mesures.reduce((a, b) => a + b, 0n);
            let phi = "0.";
            let n = vorthNS; let d = totalNS;
            for(let j = 0; j < 100; j++) { // 100 chiffres de vérité
                n *= 10n; let u = 0n;
                while(n >= d) { n -= d; u++; }
                phi += u.toString();
            }

            const coherence = (100 - (Number(totalNS - vorthNS) / Number(totalNS) * 100)).toFixed(8);
            let evolution = mem ? (Number(phi) > Number(mem.phi) ? "CROISSANCE ↑" : "DÉCOHÉRENCE ↓") : "INITIAL";
            let deltaStase = mem ? (Math.abs(Number(phi) - Number(mem.phi))).toFixed(12) : "0.000";

            const sig = btoa(phi + totalNS).toUpperCase();
            localStorage.setItem('vorth_v45_last', JSON.stringify({phi, sig}));
            mem = {phi, sig};

            document.getElementById('results').classList.remove('hidden');
            document.getElementById('res-delta').innerHTML = phi;
            document.getElementById('res-pente').innerHTML = evolution;
            document.getElementById('res-diss').innerHTML  = (totalNS - vorthNS).toString();
            document.getElementById('res-phase').innerHTML = coherence;
            document.getElementById('res-stase').innerHTML = deltaStase;
            document.getElementById('res-sig').innerHTML = sig.substring(0,32);
            document.getElementById('run-btn').disabled = false;
            
            const log = document.getElementById('stratification');
            log.innerHTML = `<div>[STRATE] ${sig.substring(0,8)} | Φ: ${phi.substring(0,10)} | COH: ${coherence}%</div>` + log.innerHTML;
        }
    </script>
</body>
</html>
