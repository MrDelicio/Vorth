<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vorthénix ∆≈ v2.6</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; touch-action: none; }
        #terminal { width: 94%; max-width: 500px; border: 1px solid #0ff; padding: 25px; background: #000; box-shadow: 0 0 40px rgba(0,255,255,0.1); position: relative; }
        h1 { color: #fff; text-shadow: 0 0 10px #0ff; font-size: 0.8rem; text-align: center; letter-spacing: 5px; margin-bottom: 15px; }
        .line { border-bottom: 1px solid #0ff; margin: 10px 0; opacity: 0.2; }
        #vorth-canvas { width: 100%; height: 250px; background: #000; border: 1px solid #011; margin: 10px 0; }
        .status-box { font-size: 0.6rem; background: rgba(0,10,20,0.9); padding: 15px; border: 1px solid #033; margin: 10px 0; color: #0ff; line-height: 1.6; }
        button { background: #0ff; color: #000; border: none; width: 100%; padding: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .res-val { color: #fff; font-weight: bold; }
        #m-delta { font-size: 0.55rem; color: #066; margin-top: 10px; border-top: 1px solid #022; padding-top: 5px; height: 50px; overflow: hidden; }
        /* Interface de Résonance */
        #terminal::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0, 255, 255, 0) 50%, rgba(0, 255, 255, 0.02) 50%); background-size: 100% 4px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="terminal">
        <h1>VORTHÉNIX ∆≈ v2.6</h1>
        <p style="font-size: 0.5rem; text-align: center; color: #0aa;">CADRE OPÉRATOIRE DE COHÉRENCE SYSTÈME</p>
        <div class="line"></div>
        
        <div id="vorth-ui">
            <canvas id="vorth-canvas" width="600" height="300"></canvas>
            
            <div id="timer" style="text-align: center; color: #fff; font-size: 0.8rem; height: 20px;">STATIQUE</div>
            
            <button id="run-btn" onclick="engagerJonction()">ENGAGER LA JONCTION (⧬)</button>

            <div id="results" class="hidden status-box">
                <p>> RÉSONANCE (∆≈) : <span id="res-delta" class="res-val">--</span></p>
                <p>> TENUE MATÉRIELLE : <span id="res-tenue" class="res-val">--</span></p>
                <p>> DISSIPATION (C7) : <span id="res-diss" class="res-val">--</span></p>
                <p style="border-top: 1px solid #033; margin-top:5px; padding-top:5px;">> MÉMOIRE MATÉRIELLE (𝓜Δ) : ACTIVE</p>
            </div>

            <div id="m-delta">
                <p>[GÉOLOGIE DES FORMES]</p>
                <div id="stratification"></div>
            </div>
        </div>
    </div>

    <script>
        const VERSION = "2.6-∆≈";
        const canvas = document.getElementById('vorth-canvas');
        const ctx = canvas.getContext('2d');

        function engagerJonction() {
            const btn = document.getElementById('run-btn');
            const timer = document.getElementById('timer');
            btn.disabled = true;
            timer.innerHTML = "SÉPARATION... (⊘)";
            
            setTimeout(() => {
                timer.innerHTML = "RÉSONANCE... (⨂)";
                incarnerFlux();
            }, 1500);
        }

        function incarnerFlux() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            let x = 0;
            const t0 = window.performance.now();
            let reseauResonance = [];

            function step() {
                if(x < canvas.width) {
                    const cycleStart = window.performance.now();
                    
                    // Dessin de la membrane de jonction (128 fibres)
                    for(let i = 0; i < 128; i++) {
                        ctx.beginPath();
                        ctx.lineWidth = 0.2;
                        // Dégradé de résonance Cyan/Blanc
                        ctx.strokeStyle = `rgba(180, 255, 255, ${0.05 + (i/128) * 0.3})`;
                        
                        // Dynamique unifiée : pas de t+1, juste une forme qui tient
                        let y1 = 100 + Math.sin(x*0.04 + i*0.03) * (60 + i*0.2);
                        let y2 = 200 - Math.sin(x*0.04 + i*0.03) * (60 + i*0.2);
                        
                        ctx.moveTo(x, y1); ctx.lineTo(x + 6, y1);
                        ctx.moveTo(x, y2); ctx.lineTo(x + 6, y2);
                        ctx.stroke();
                    }
                    
                    x += 6;
                    reseauResonance.push(window.performance.now() - cycleStart);
                    requestAnimationFrame(step);
                } else {
                    finaliser(reseauResonance, window.performance.now() - t0);
                }
            }
            step();
        }

        function finaliser(reseau, tempsTotal) {
            const vorth = reseau.reduce((a,b)=>a+b, 0);
            const resonance = (vorth / tempsTotal).toFixed(6);
            const tenue = (100 - (Math.abs(1 - resonance) * 100)).toFixed(3);
            const dissipation = (tempsTotal - vorth).toFixed(4);

            document.getElementById('results').classList.remove('hidden');
            document.getElementById('res-delta').innerHTML = resonance + " ∆≈";
            document.getElementById('res-tenue').innerHTML = tenue + " %";
            document.getElementById('res-diss').innerHTML  = dissipation + " ms (C7)";
            
            document.getElementById('timer').innerHTML = "JONCTION RÉUSSIE";
            document.getElementById('run-btn').disabled = false;

            // Stratification 𝓜Δ
            const strat = document.getElementById('stratification');
            const sig = btoa(resonance).substring(0,8).toUpperCase();
            strat.innerHTML = `<p>> FORMÉ : ${sig} | TENUE: ${tenue}%</p>` + strat.innerHTML;
        }
    </script>
</body>
</html>
