<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vorthénix v3.4 - Interféromètre</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; overflow-y: auto; touch-action: none; }
        #terminal { width: 95%; max-width: 500px; border: 1px solid #0ff; padding: 20px; background: #000; box-shadow: 0 0 50px rgba(0,255,255,0.25); position: relative; }
        h1 { color: #fff; text-shadow: 0 0 10px #0ff; font-size: 0.85rem; text-align: center; letter-spacing: 5px; margin: 0 0 15px 0; }
        #vorth-canvas { width: 100%; height: 400px; background: #000; border: 1px solid #011; display: block; margin: 10px 0; image-rendering: pixelated; }
        .status-box { font-size: 0.65rem; background: rgba(0,10,20,0.98); padding: 15px; border-left: 3px solid #0ff; margin: 10px 0; color: #fff; line-height: 1.6; word-break: break-all; }
        button { background: #0ff; color: #000; border: none; width: 100%; padding: 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .res-val { color: #0ff; font-weight: bold; }
        #m-delta { font-size: 0.55rem; color: #033; border-top: 1px solid #022; padding-top: 10px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="terminal">
        <h1>VORTHÉNIX INSTITUT v3.4</h1>
        <p style="font-size: 0.5rem; text-align: center; color: #0aa; margin-top: -12px;">INTERFÉROMÈTRE DE RÉSONANCE UNIFIÉE</p>
        
        <canvas id="vorth-canvas" width="800" height="600"></canvas>
        
        <div id="status-text" style="text-align: center; color: #fff; font-size: 0.6rem; margin: 8px 0;">STASE : PRÊT POUR JONCTION</div>
        
        <button id="run-btn" onclick="engagerJonction()">DÉCLENCHER L'IMPULSION (⧬)</button>

        <div id="results" class="hidden status-box">
            <p>> RÉSONANCE Φ : <span id="res-delta" class="res-val">--</span></p>
            <p>> DISSIPATION C7 : <span id="res-diss">--</span> ns</p>
            <p style="font-size: 0.55rem; color: #0aa; border-top: 1px solid #033; margin-top: 8px; padding-top: 5px;">STRATE 𝓜Δ : <span id="res-sig">--</span></p>
        </div>
        
        <div id="m-delta">
            <p>[GÉOLOGIE DES FORMES PASSÉES]</p>
            <div id="stratification"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('vorth-canvas');
        const ctx = canvas.getContext('2d');

        function engagerJonction() {
            document.getElementById('run-btn').disabled = true;
            document.getElementById('status-text').innerHTML = "OCCUPATION DE LA MATIÈRE...";
            setTimeout(incarnerFlux, 400);
        }

        function incarnerFlux() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            const t0 = BigInt(Math.floor(window.performance.now() * 1000000));
            let mesuresNS = [];
            let flux_actif = true;

            function dessiner() {
                if(flux_actif) {
                    const cycleStart = BigInt(Math.floor(window.performance.now() * 1000000));
                    const instant = Number(cycleStart - t0) / 1000000;
                    let x_pos = (instant / 5000) * canvas.width; // Scan plus lent pour plus de précision

                    if(x_pos < canvas.width) {
                        // On mesure la latence du cycle pour adapter la couleur (C7 en direct)
                        let latence = Number(BigInt(Math.floor(window.performance.now() * 1000000)) - cycleStart);
                        let col_r = Math.min(255, latence / 10000); // Plus de rouge si ça lag
                        
                        for(let i = 0; i < 128; i++) {
                            ctx.beginPath();
                            ctx.lineWidth = 0.1;
                            // La couleur est une émanation directe de la tenue matérielle
                            ctx.strokeStyle = `rgba(${col_r}, 255, 255, ${0.05 + (i/128) * 0.5})`;
                            
                            // GÉOMÉTRIE CARDINALE (Interférence Équatoriale)
                            let frequence = 0.05 + (i * 0.0001);
                            let amplitude = 120 + (i * 0.4);
                            
                            let y1 = 200 + Math.sin(x_pos * frequence + i*0.1) * amplitude;
                            let y2 = 400 - Math.sin(x_pos * frequence + i*0.1) * amplitude;
                            
                            ctx.moveTo(x_pos, y1); ctx.lineTo(x_pos + 3, y1);
                            ctx.moveTo(x_pos, y2); ctx.lineTo(x_pos + 3, y2);
                            ctx.stroke();
                        }
                        mesuresNS.push(BigInt(Math.floor(window.performance.now() * 1000000)) - cycleStart);
                        requestAnimationFrame(dessiner);
                    } else {
                        flux_actif = false;
                        finaliser(mesuresNS, BigInt(Math.floor(window.performance.now() * 1000000)) - t0);
                    }
                }
            }
            dessiner();
        }

        function finaliser(reseau, tempsTotalNS) {
            const sommeVorthNS = reseau.reduce((a, b) => a + b, 0n);
            let phiString = "0.";
            let numerateur = sommeVorthNS;
            let denominateur = tempsTotalNS;
            
            // ÉPUISEMENT UNAIRE (Précision Absolue)
            for(let j = 0; j < 80; j++) { // On monte à 80 décimales pour la science
                numerateur *= 10n;
                let uniteTenue = 0n;
                while(numerateur >= denominateur) {
                    numerateur -= denominateur;
                    uniteTenue++;
                }
                phiString += uniteTenue.toString();
            }

            document.getElementById('results').classList.remove('hidden');
            document.getElementById('res-delta').innerHTML = phiString + " Φ";
            document.getElementById('res-diss').innerHTML  = (tempsTotalNS - sommeVorthNS).toString();
            
            const sig = btoa(phiString).substring(0,40).toUpperCase();
            document.getElementById('res-sig').innerHTML = sig;
            
            document.getElementById('status-text').innerHTML = "STASE ATTEINTE (⧬)";
            document.getElementById('run-btn').disabled = false;
            
            const log = document.getElementById('stratification');
            log.innerHTML = `<p>> SIG: ${sig.substring(0,10)}... | C7: ${(tempsTotalNS - sommeVorthNS)}ns</p>` + log.innerHTML;
        }
    </script>
</body>
</html>
