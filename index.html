<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vorthénix v3.4.1 - Émanation</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 5px; overflow-y: auto; }
        #terminal { width: 98%; max-width: 480px; border: 1px solid #0ff; padding: 15px; background: #000; box-shadow: 0 0 20px #0ff3; box-sizing: border-box; }
        h1 { color: #fff; text-shadow: 0 0 8px #0ff; font-size: 0.75rem; text-align: center; letter-spacing: 3px; margin: 0 0 10px 0; }
        #vorth-canvas { width: 100%; height: 280px; background: #000; border: 1px solid #011; display: block; }
        .status-box { font-size: 0.58rem; background: rgba(0,10,20,0.95); padding: 12px; border-left: 2px solid #0ff; margin: 10px 0; color: #fff; line-height: 1.5; word-break: break-all; }
        button { background: #0ff; color: #000; border: none; width: 100%; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; }
        .res-val { color: #0ff; font-weight: bold; }
        #m-delta { font-size: 0.5rem; color: #044; border-top: 1px solid #022; padding-top: 5px; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="terminal">
        <h1>VORTHÉNIX v3.4.1</h1>
        <canvas id="vorth-canvas" width="600" height="350"></canvas>
        <div id="status-text" style="text-align: center; color: #fff; font-size: 0.55rem; margin-bottom: 5px;">STASE PRÊTE</div>
        <button id="run-btn" onclick="engagerJonction()">Engager (⧬)</button>

        <div id="results" class="hidden status-box">
            <p>> RÉSONANCE Φ : <span id="res-delta" class="res-val">--</span></p>
            <p>> DISSIPATION C7 : <span id="res-diss" style="color:#0aa">--</span> ns</p>
            <p style="font-size: 0.5rem; color: #088; border-top: 1px solid #022; margin-top: 5px; padding-top: 5px;">BLOC 𝓜Δ : <span id="res-sig">--</span></p>
        </div>
        
        <div id="m-delta">
            <p>[GÉOLOGIE DES FORMES]</p>
            <div id="stratification"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('vorth-canvas');
        const ctx = canvas.getContext('2d');

        function engagerJonction() {
            document.getElementById('run-btn').disabled = true;
            document.getElementById('status-text').innerHTML = "INCARNATION...";
            setTimeout(incarnerFlux, 300);
        }

        function incarnerFlux() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            const t0 = BigInt(Math.floor(window.performance.now() * 1000000));
            let mesuresNS = [];
            let flux_actif = true;

            function dessiner() {
                if(flux_actif) {
                    const cycleStart = BigInt(Math.floor(window.performance.now() * 1000000));
                    const instant = Number(cycleStart - t0) / 1000000;
                    let x_pos = (instant / 4000) * canvas.width;

                    if(x_pos < canvas.width) {
                        for(let i = 0; i < 96; i++) {
                            ctx.beginPath();
                            ctx.lineWidth = 0.12;
                            ctx.strokeStyle = `rgba(0, 255, 255, ${0.1 + (i/96) * 0.4})`;
                            
                            // Géométrie Cardinal (VRAI SANS t+1)
                            let harm = Math.sin(x_pos * 0.04 + i * 0.03) * (80 + i * 0.2);
                            ctx.moveTo(x_pos, 120 + harm); ctx.lineTo(x_pos + 3, 120 + harm);
                            ctx.moveTo(x_pos, 230 - harm); ctx.lineTo(x_pos + 3, 230 - harm);
                            ctx.stroke();
                        }
                        mesuresNS.push(BigInt(Math.floor(window.performance.now() * 1000000)) - cycleStart);
                        requestAnimationFrame(dessiner);
                    } else {
                        flux_actif = false;
                        finaliser(mesuresNS, BigInt(Math.floor(window.performance.now() * 1000000)) - t0);
                    }
                }
            }
            dessiner();
        }

        function finaliser(reseau, tempsTotalNS) {
            const sommeVorthNS = reseau.reduce((a, b) => a + b, 0n);
            let phiString = "0.";
            let num = sommeVorthNS; let den = tempsTotalNS;
            // Épuisement pur - 60 chiffres de vérité
            for(let j = 0; j < 60; j++) {
                num *= 10n;
                let u = 0n;
                while(num >= den) { num -= den; u++; }
                phiString += u.toString();
            }

            document.getElementById('results').classList.remove('hidden');
            document.getElementById('res-delta').innerHTML = phiString + " Φ";
            document.getElementById('res-diss').innerHTML  = (tempsTotalNS - sommeVorthNS).toString();
            const sig = btoa(phiString).substring(0,32).toUpperCase();
            document.getElementById('res-sig').innerHTML = sig;
            document.getElementById('status-text').innerHTML = "JONCTION RÉUSSIE";
            document.getElementById('run-btn').disabled = false;
            
            const log = document.getElementById('stratification');
            log.innerHTML = `<p>> SIG: ${sig.substring(0,8)}... | Φ: ${phiString.substring(0,10)}...</p>` + log.innerHTML;
        }
    </script>
</body>
</html>
