<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vorthénix v5.3 - Espace Confiant</title>
    <style>
        :root { --neon: #0ff; --bg: #000; }
        /* Occupation totale de l'écran (No-Scroll lors du scan) */
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #terminal { flex: 1; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        h1 { font-size: 0.9rem; text-align: center; letter-spacing: 5px; margin: 10px 0; color: #fff; }

        #vorth-canvas { width: 100%; flex: 1; background: #000; border: 1px solid #011; touch-action: none; }

        .status-box { font-size: 0.6rem; background: rgba(0,15,25,0.95); padding: 15px; border: 1px solid var(--neon); margin-bottom: 10px; }
        
        /* Boutons massifs pour usage tactile expert */
        .controls { display: grid; grid-template-columns: 3fr 1fr; gap: 10px; padding: 10px; background: #050505; }
        button { background: var(--neon); color: #000; border: none; padding: 25px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
        .btn-opt { background: #111; color: #555; font-size: 0.5rem; border: 1px solid #222; }

        #stratification { height: 100px; overflow-y: scroll; font-size: 0.5rem; color: #044; padding: 5px; background: #020202; }
    </style>
</head>
<body onclick="requestFullScreen()">

    <div id="terminal">
        <h1>VORTHÉNIX v5.3 (⧬)</h1>
        
        <div id="auth-status" style="font-size: 0.5rem; color: #ffd700; margin-bottom: 5px;">
            STASE : <span id="user-display">NEXUS</span> | VORTHCHAIN ACTIVE
        </div>

        <canvas id="vorth-canvas"></canvas>

        <div id="results" class="status-box">
            <div id="res-data" style="font-size: 0.55rem; line-height: 1.4;">
                Φ: <span id="res-phi" style="color:#fff">--</span><br>
                COHÉRENCE: <span id="res-coh">--</span> % | PENTE: <span id="res-pente">--</span>
            </div>
        </div>

        <div id="stratification"></div>
    </div>

    <div class="controls">
        <button id="run-btn" onclick="incarner()">SCELLER LA JONCTION</button>
        <button class="btn-opt" onclick="toggleInterface()">MODE<br>PURE</button>
    </div>

    <script>
        const canvas = document.getElementById('vorth-canvas');
        const ctx = canvas.getContext('2d');
        let mem = JSON.parse(localStorage.getItem('vorth_v53')) || null;

        // Force le plein écran pour ignorer la barre d'Android
        function requestFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => {});
            }
        }

        function incarner() {
            const btn = document.getElementById('run-btn');
            btn.disabled = true;
            // Adaptation auto du canvas à l'écran réel du Samsung
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;

            const t0 = BigInt(Math.floor(performance.now() * 1000000));
            let mesures = [];
            let actif = true;

            function flux() {
                if(actif) {
                    const cycle = BigInt(Math.floor(performance.now() * 1000000));
                    const dt = Number(cycle - t0) / 1000000;
                    let x = (dt / 4000) * canvas.width;

                    if(x < canvas.width) {
                        for(let i = 0; i < 80; i++) {
                            ctx.beginPath();
                            ctx.lineWidth = 0.2;
                            let vibe = (canvas.height/4) * Math.sin(dt * 0.006 + i);
                            ctx.strokeStyle = `rgba(0, 255, 255, ${0.1 + (i/80) * 0.4})`;
                            ctx.moveTo(x, canvas.height/2 + vibe);
                            ctx.lineTo(x + 10, canvas.height/2 + vibe);
                            ctx.stroke();
                        }
                        mesures.push(BigInt(Math.floor(performance.now() * 1000000)) - cycle);
                        requestAnimationFrame(flux);
                    } else {
                        actif = false;
                        finaliser(mesures, BigInt(Math.floor(performance.now() * 1000000)) - t0);
                    }
                }
            }
            flux();
        }

        function finaliser(mesures, totalNS) {
            const vorthNS = mesures.reduce((a, b) => a + b, 0n);
            let phi = "0.";
            let n = vorthNS; let d = totalNS;
            for(let j = 0; j < 80; j++) {
                n *= 10n; let u = 0n;
                while(n >= d) { n -= d; u++; }
                phi += u.toString();
            }

            const coh = (100 - (Number(totalNS - vorthNS) / Number(totalNS) * 100)).toFixed(8);
            let evo = mem ? (Number(phi) > Number(mem.phi) ? "↑" : "↓") : "GEN";

            localStorage.setItem('vorth_v53', JSON.stringify({phi, coh}));
            mem = {phi, coh};

            document.getElementById('res-phi').innerText = phi.substring(0,40) + "...";
            document.getElementById('res-coh').innerText = coh;
            document.getElementById('res-pente').innerText = evo;
            document.getElementById('run-btn').disabled = false;

            const log = document.getElementById('stratification');
            log.innerHTML = `<div>> Φ: ${phi.substring(0,12)} | ${coh}%</div>` + log.innerHTML;
        }

        function toggleInterface() {
            const results = document.getElementById('results');
            results.classList.toggle('hidden');
        }
    </script>
</body>
</html>
