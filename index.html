<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vorthénix OS v2.2</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #terminal { width: 88%; max-width: 440px; border: 1px solid #0f0; padding: 20px; background: rgba(0, 10, 0, 0.98); box-shadow: 0 0 30px rgba(0,255,0,0.2); border-radius: 5px; position: relative; }
        h1 { color: #fff; text-shadow: 0 0 10px #0f0; font-size: 1rem; text-align: center; letter-spacing: 3px; margin: 0 0 10px 0; }
        .line { border-bottom: 1px solid #0f0; margin: 10px 0; opacity: 0.2; }
        button { background: #0f0; color: #000; border: none; width: 100%; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        button:disabled { background: #020; color: #040; }
        #vorth-canvas { width: 100%; height: 150px; background: #000; border: 1px solid #020; margin: 10px 0; }
        .status-box { font-size: 0.65rem; background: rgba(0,30,0,0.9); padding: 12px; border-left: 3px solid #0f0; margin: 10px 0; line-height: 1.4; }
        #timer { font-size: 1.2rem; color: #fff; text-align: center; height: 25px; font-weight: bold; }
        #archives { font-size: 0.6rem; color: #555; max-height: 70px; overflow-y: auto; border-top: 1px solid #020; padding-top: 8px; }
        .sig-text { color: #0ff; font-weight: bold; }
        /* Scanline effect */
        #terminal::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); background-size: 100% 4px; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

    <div id="terminal">
        <h1>VORTHÉNIX INSTITUT v2.2</h1>
        <div class="line"></div>
        
        <p class="status-box">> CAPTEUR HAUTE RÉSOLUTION i128 ACTIVÉ.<br>> PRÊT POUR L'EXTRACTION D'EMPREINTE MATIÈRE.</p>

        <canvas id="vorth-canvas" width="400" height="150"></canvas>
        <div id="timer">STANDBY</div>

        <button id="run-btn" onclick="runHighResScan()">DÉMARRER DOUBLE SCAN HR</button>

        <div id="results" class="hidden">
            <div class="status-box">
                <p id="res-raw">> BRUIT HARDWARE : --</p>
                <p id="res-iso">> ISOLATION VORTH : --</p>
                <p id="res-delta" style="color: #0ff; border-top: 1px solid #040; margin-top: 5px; padding-top: 5px;">> PURETÉ (DELTA) : --</p>
            </div>
        </div>

        <div id="archives">
            <p style="color:#0a0">[JOURNAL DE CRÉATION]</p>
            <div id="log-list"></div>
        </div>

        <button onclick="localStorage.clear(); location.reload();" style="background:#200; color:#fff; font-size:0.5rem; margin-top:15px; padding: 5px;">RESTART CORE</button>
    </div>

    <script>
        const VERSION = "2.2";

        window.onload = () => {
            if (localStorage.getItem('vorth_v22') !== VERSION) {
                localStorage.clear();
                localStorage.setItem('vorth_v22', VERSION);
            }
            updateLogs();
        };

        async function runHighResScan() {
            const btn = document.getElementById('run-btn');
            const timer = document.getElementById('timer');
            btn.disabled = true;

            // SCAN 1 : BRUIT
            timer.innerHTML = "CAPTURE DU BRUIT...";
            const rawTime = await performMeasure(false);
            
            // CHAMBRE DE VIDE
            let count = 2;
            const cd = setInterval(() => {
                timer.innerHTML = `VIDE : T-${count}s`;
                if(count-- <= 0) {
                    clearInterval(cd);
                    timer.innerHTML = "ISOLATION...";
                    startIsolatedScan(rawTime);
                }
            }, 1000);
        }

        async function startIsolatedScan(rawTime) {
            const isoTime = await performMeasure(true);
            showResults(rawTime, isoTime);
        }

        function performMeasure(isIsolated) {
            return new Promise(resolve => {
                const canvas = document.getElementById('vorth-canvas');
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0,0,canvas.width,canvas.height);
                
                let x = 0;
                let frameTimes = [];
                const numLines = 64; // 64 haut + 64 bas = 128 fibres

                function step() {
                    if(x < canvas.width) {
                        let tS = window.performance.now();
                        
                        // Dessin du faisceau de 128 fibres
                        for(let i = 0; i < numLines; i++) {
                            ctx.beginPath();
                            ctx.lineWidth = 0.5;
                            ctx.strokeStyle = isIsolated ? `rgba(0, 255, 0, ${1 - i/numLines})` : `rgba(80, 80, 80, 0.3)`;
                            
                            let offset = i * 0.8;
                            // Courbes fines orthosymétriques
                            ctx.moveTo(x, 50 + Math.sin(x*0.08 + i*0.1) * (15 + i*0.2));
                            ctx.lineTo(x + 5, 50 + Math.sin((x+5)*0.08 + i*0.1) * (15 + i*0.2));
                            
                            ctx.moveTo(x, 100 - Math.sin(x*0.08 + i*0.1) * (15 + i*0.2));
                            ctx.lineTo(x + 5, 100 - Math.sin((x+5)*0.08 + i*0.1) * (15 + i*0.2));
                            ctx.stroke();
                        }
                        
                        x += 5;
                        frameTimes.push(window.performance.now() - tS);
                        requestAnimationFrame(step);
                    } else {
                        resolve(frameTimes.reduce((a,b)=>a+b, 0));
                    }
                }
                step();
            });
        }

        function showResults(raw, iso) {
            const delta = Math.abs(raw - iso).toFixed(4);
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('res-raw').innerHTML = `> BRUIT CAPTÉ : ${raw.toFixed(4)} ms`;
            document.getElementById('res-iso').innerHTML = `> ISOLATION HR : ${iso.toFixed(4)} ms`;
            document.getElementById('res-delta').innerHTML = `> PURETÉ EXTRAITE : <span class="sig-text">${delta} ms</span>`;
            
            document.getElementById('timer').innerHTML = "SCAN TERMINÉ";
            document.getElementById('run-btn').disabled = false;

            const sig = "V" + btoa(delta).substring(0,6).toUpperCase();
            let logs = JSON.parse(localStorage.getItem('v_logs_hr') || "[]");
            logs.unshift({t: new Date().toLocaleTimeString(), d: delta, s: sig});
            localStorage.setItem('v_logs_hr', JSON.stringify(logs.slice(0,5)));
            updateLogs();
        }

        function updateLogs() {
            const logs = JSON.parse(localStorage.getItem('v_logs_hr') || "[]");
            document.getElementById('log-list').innerHTML = logs.map(l => `<p>[${l.t}] SIG: ${l.s} | DELTA: ${l.d}ms</p>`).join('');
        }
    </script>
</body>
</html>
