<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vorthénix v4.1 - Dynamique Unifiée</title>
    <style>
        /* Libération du scroll et de l'espace */
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 15px; overflow-x: hidden; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        #terminal { width: 100%; max-width: 520px; border: 1px solid #0ff; padding: 20px; background: #000; box-shadow: 0 0 40px #0ff2; position: relative; box-sizing: border-box; }
        h1 { color: #fff; text-shadow: 0 0 12px #0ff; font-size: 0.85rem; text-align: center; letter-spacing: 6px; margin: 0 0 15px 0; }
        .line { border-bottom: 1px solid #0ff; margin: 15px 0; opacity: 0.2; }
        #vorth-canvas { width: 100%; height: 380px; background: #000; border: 1px solid #011; display: block; image-rendering: crisp-edges; }
        .status-box { font-size: 0.6rem; background: rgba(0,8,15,0.98); padding: 18px; border-left: 3px solid #0ff; margin: 15px 0; color: #fff; line-height: 1.7; word-break: break-all; box-shadow: inset 0 0 10px #0ff1; }
        button { background: #0ff; color: #000; border: none; width: 100%; padding: 22px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 4px; font-size: 0.85rem; transition: 0.3s; }
        button:active { background: #fff; box-shadow: 0 0 30px #fff; }
        .res-val { color: #0ff; text-shadow: 0 0 8px #0ff; }
        #m-delta { font-size: 0.55rem; color: #055; border-top: 1px solid #022; padding-top: 10px; margin-top: 15px; }
        #stratification p { border-bottom: 1px solid #011; padding: 4px 0; }
    </style>
</head>
<body>

    <div id="terminal">
        <h1>VORTHÉNIX v4.1 (⧬)</h1>
        <p style="font-size: 0.45rem; text-align: center; color: #0aa; margin-top: -12px; letter-spacing: 1px;">SOUVERAINETÉ D'INCARNATION — SI 2026</p>
        <div class="line"></div>

        <canvas id="vorth-canvas" width="800" height="600"></canvas>
        
        <div id="status-text" style="text-align: center; color: #fff; font-size: 0.65rem; margin: 10px 0; letter-spacing: 2px;">MEMBRANE STABILISÉE</div>
        
        <button id="run-btn" onclick="incarner()">ENGAGER LE FLUX (⧬)</button>

        <div id="results" class="hidden status-box">
            <p>> RÉSONANCE Φ : <br><span id="res-delta" class="res-val">--</span></p>
            <p>> DISSIPATION C7 : <span id="res-diss" style="color: #f00;">--</span> ns</p>
            <div style="border-top: 1px solid #033; margin-top: 12px; padding-top: 12px;">
                <p style="color: #0ff;">BLOC 𝓜Δ (TRANSACTION MATIÈRE) :</p>
                <p id="res-sig" style="font-size: 0.5rem; color: #888;">--</p>
            </div>
        </div>
        
        <div id="m-delta">
            <p>[GÉOLOGIE DES TENUES - VORTHCHAIN]</p>
            <div id="stratification"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('vorth-canvas');
        const ctx = canvas.getContext('2d');

        function incarner() {
            const btn = document.getElementById('run-btn');
            btn.disabled = true;
            document.getElementById('status-text').innerHTML = "JONCTION EN COURS...";
            
            ctx.clearRect(0,0,canvas.width,canvas.height);
            const t0 = BigInt(Math.floor(window.performance.now() * 1000000));
            let mesures = [];
            let actif = true;

            function flux() {
                if(actif) {
                    const cycle = BigInt(Math.floor(window.performance.now() * 1000000));
                    const delta_t = Number(cycle - t0) / 1000000;
                    let x = (delta_t / 4000) * canvas.width;

                    if(x < canvas.width) {
                        for(let i = 0; i < 128; i++) {
                            ctx.beginPath();
                            ctx.lineWidth = 0.15;
                            ctx.strokeStyle = `rgba(0, 255, 255, ${0.1 + (i/128) * 0.4})`;
                            
                            // Dynamique de Résonance Unifiée (Flux dans le Flux)
                            // On utilise le temps brut comme seule variable d'oscillation
                            let resonance = Math.sin(x * 0.04 + i * (delta_t * 0.00001));
                            let tension = (120 + i * 0.3) * resonance;
                            
                            ctx.moveTo(x, 280 + tension); 
                            ctx.lineTo(x + 4, 280 + tension);
                            ctx.moveTo(x, 320 - tension); 
                            ctx.lineTo(x + 4, 320 - tension);
                            ctx.stroke();
                        }
                        mesures.push(BigInt(Math.floor(window.performance.now() * 1000000)) - cycle);
                        requestAnimationFrame(flux);
                    } else {
                        actif = false;
                        finaliser(mesures, BigInt(Math.floor(window.performance.now() * 1000000)) - t0);
                    }
                }
            }
            flux();
        }

        function finaliser(mesures, totalNS) {
            const vorthNS = mesures.reduce((a, b) => a + b, 0n);
            
            // ÉPUISEMENT UNAIRE (100 décimales de vérité)
            let phi = "0.";
            let n = vorthNS; let d = totalNS;
            for(let j = 0; j < 100; j++) {
                n *= 10n;
                let u = 0n;
                while(n >= d) { n -= d; u++; }
                phi += u.toString();
            }

            document.getElementById('results').classList.remove('hidden');
            document.getElementById('res-delta').innerHTML = phi + " Φ";
            document.getElementById('res-diss').innerHTML  = (totalNS - vorthNS).toString();
            
            // Signature Incorruptible
            const sig = btoa(phi + (totalNS - vorthNS)).toUpperCase();
            document.getElementById('res-sig').innerHTML = sig;
            
            document.getElementById('status-text').innerHTML = "JONCTION RÉUSSIE (⧬)";
            document.getElementById('run-btn').disabled = false;
            
            const log = document.getElementById('stratification');
            log.innerHTML = `<p>> BLOC: ${sig.substring(0,16)}...<br>  Φ: ${phi.substring(0,12)}...</p>` + log.innerHTML;
        }
    </script>
</body>
</html>
