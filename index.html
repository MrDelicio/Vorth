<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vorthénix v4.4 - Preuve Matérielle</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
        #terminal { width: 100%; max-width: 520px; border: 1px solid #0ff; padding: 20px; background: #000; box-shadow: 0 0 40px rgba(0,255,255,0.2); position: relative; box-sizing: border-box; }
        h1 { color: #fff; text-shadow: 0 0 12px #0ff; font-size: 0.9rem; text-align: center; letter-spacing: 5px; margin: 0; }
        #vorth-canvas { width: 100%; height: 350px; background: #000; border: 1px solid #011; display: block; margin: 15px 0; image-rendering: pixelated; }
        .status-box { font-size: 0.62rem; background: rgba(0,8,15,0.98); padding: 18px; border-left: 3px solid #0ff; margin: 10px 0; color: #fff; line-height: 1.6; word-break: break-all; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; border-top: 1px solid #033; padding-top: 10px; }
        .data-item { font-size: 0.55rem; color: #0aa; }
        .val { color: #fff; font-weight: bold; }
        button { background: #0ff; color: #000; border: none; width: 100%; padding: 22px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 4px; font-size: 0.85rem; }
        .stable { color: #0f0; } .instable { color: #f33; }
        #m-delta { font-size: 0.52rem; color: #055; border-top: 1px solid #022; padding-top: 10px; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="terminal">
        <h1>VORTHÉNIX v4.4 (⧬)</h1>
        <p style="font-size: 0.45rem; text-align: center; color: #088; margin-top: -12px;">LABORATOIRE DE RÉSONANCE — SI 2026</p>

        <canvas id="vorth-canvas" width="800" height="600"></canvas>
        
        <button id="run-btn" onclick="incarner()">SCELLER LE MAILLON (⧬)</button>

        <div id="results" class="hidden status-box">
            <p style="color: #0aa; font-size: 0.5rem; margin-bottom: 5px;">RÉSONANCE SOUVERAINE 𝚽 :</p>
            <p id="res-delta" style="color:#0ff; font-size: 0.65rem; font-weight: bold;">--</p>
            
            <div class="data-grid">
                <div class="data-item">ÉVOLUTION : <br><span id="res-pente" class="val">--</span></div>
                <div class="data-item">DISSIPATION C7 : <br><span id="res-diss" class="val">--</span> ns</div>
                <div class="data-item">COHÉRENCE PHASE : <br><span id="res-phase" class="val">--</span> %</div>
                <div class="data-item">DENSITÉ FLUX : <br><span id="res-dens" class="val">--</span></div>
            </div>

            <p style="margin-top:10px; border-top:1px solid #033; padding-top:10px; font-size:0.5rem; color:#0ff;">SIG-CHAIN 𝓜Δ (Incorruptible) : <br><span id="res-sig" style="color:#aaa">--</span></p>
        </div>
        
        <div id="m-delta">
            <p>[ARCHIVES DE RÉSONANCE MATÉRIELLE]</p>
            <div id="stratification" style="max-height: 200px; overflow-y: auto;"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('vorth-canvas');
        const ctx = canvas.getContext('2d');
        let blocPrecedent = JSON.parse(localStorage.getItem('vorth_chain_last')) || null;

        function incarner() {
            document.getElementById('run-btn').disabled = true;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            const t0 = BigInt(Math.floor(window.performance.now() * 1000000));
            let mesures = [];
            let actif = true;

            function flux() {
                if(actif) {
                    const cycle = BigInt(Math.floor(window.performance.now() * 1000000));
                    const dt = Number(cycle - t0) / 1000000;
                    let x = (dt / 4000) * canvas.width;

                    if(x < canvas.width) {
                        for(let i = 0; i < 96; i++) {
                            ctx.beginPath();
                            ctx.lineWidth = 0.15;
                            // Liaison génomique : le bloc précédent influence la fréquence
                            let seed = blocPrecedent ? (blocPrecedent.phi.charCodeAt(i%10) * 0.0001) : 0.04;
                            let reso = Math.sin(x * seed + i * (dt * 0.00001));
                            let tens = (110 + i * 0.3) * reso;
                            
                            ctx.strokeStyle = `rgba(0, 255, 255, ${0.1 + (i/96) * 0.4})`;
                            ctx.moveTo(x, 280 + tens); ctx.lineTo(x + 4, 280 + tens);
                            ctx.moveTo(x, 320 - tens); ctx.lineTo(x + 4, 320 - tens);
                            ctx.stroke();
                        }
                        mesures.push(BigInt(Math.floor(window.performance.now() * 1000000)) - cycle);
                        requestAnimationFrame(flux);
                    } else {
                        actif = false;
                        finaliser(mesures, BigInt(Math.floor(window.performance.now() * 1000000)) - t0);
                    }
                }
            }
            flux();
        }

        function finaliser(mesures, totalNS) {
            const vorthNS = mesures.reduce((a, b) => a + b, 0n);
            let phi = "0.";
            let n = vorthNS; let d = totalNS;
            // Épuisement unaire pur
            for(let j = 0; j < 80; j++) {
                n *= 10n; let u = 0n;
                while(n >= d) { n -= d; u++; }
                phi += u.toString();
            }

            const coherence = (100 - (Number(totalNS - vorthNS) / Number(totalNS) * 100)).toFixed(6);
            const densite = (Number(vorthNS) / Number(totalNS)).toFixed(12);
            
            let evolution = "SCAN INITIAL";
            let classePente = "val";
            if(blocPrecedent) {
                let diff = Number(phi) - Number(blocPrecedent.phi);
                evolution = diff > 0 ? "STABILISATION ↑" : "DÉGRADATION ↓";
                classePente = diff > 0 ? "val stable" : "val instable";
            }

            const sig = btoa(phi + totalNS + (blocPrecedent ? blocPrecedent.sig : "GENESIS")).toUpperCase();
            localStorage.setItem('vorth_chain_last', JSON.stringify({phi, sig}));
            blocPrecedent = {phi, sig};

            document.getElementById('results').classList.remove('hidden');
            document.getElementById('res-delta').innerHTML = phi + " Φ";
            document.getElementById('res-pente').className = classePente;
            document.getElementById('res-pente').innerHTML = evolution;
            document.getElementById('res-diss').innerHTML  = (totalNS - vorthNS).toString();
            document.getElementById('res-phase').innerHTML = coherence;
            document.getElementById('res-dens').innerHTML  = densite;
            document.getElementById('res-sig').innerHTML = sig;
            document.getElementById('run-btn').disabled = false;
            
            const log = document.getElementById('stratification');
            log.innerHTML = `<div style="color:#555; font-size:0.5rem; border-bottom:1px solid #011; padding: 5px 0;"> [LOG] ${sig.substring(0,10)}... | COH: ${coherence}% | Φ: ${phi.substring(0,12)} </div>` + log.innerHTML;
        }
    </script>
</body>
</html>
