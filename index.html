<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vorthénix OS</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #terminal { width: 85%; max-width: 420px; border: 1px solid #0f0; padding: 25px; background: rgba(0, 15, 0, 0.95); box-shadow: 0 0 20px #0f0; position: relative; border-radius: 5px; }
        h1 { color: #fff; text-shadow: 0 0 10px #0f0; font-size: 1.2rem; text-align: center; margin: 0 0 20px 0; letter-spacing: 2px; }
        .line { border-bottom: 1px solid #0f0; margin: 15px 0; opacity: 0.4; }
        input { background: #000; border: 1px solid #0f0; color: #fff; width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box; outline: none; font-size: 1rem; }
        button { background: #0f0; color: #000; border: none; width: 100%; padding: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; transition: 0.2s; }
        button:active { background: #fff; transform: scale(0.98); }
        .hidden { display: none !important; }
        #vorth-canvas { width: 100%; height: 100px; border: 1px solid #040; background: #000; margin: 15px 0; display: block; }
        .status { font-size: 0.75rem; color: #0f0; margin-bottom: 8px; font-weight: bold; }
        .logout { background: #600; color: #fff; margin-top: 25px; font-size: 0.7rem; opacity: 0.8; }
        #terminal::after { content: " "; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); z-index: 2; pointer-events: none; background-size: 100% 2px, 3px 100%; }
    </style>
</head>
<body>

    <div id="terminal">
        <h1>INSTITUT VORTHÉNIX v1.5</h1>
        <div class="line"></div>
        
        <div id="setup-section" class="hidden">
            <p class="status">> INITIALISATION SOUVERAINE i128</p>
            <input type="text" id="new-username" placeholder="NOM DE L'OPÉRATEUR">
            <input type="password" id="new-password" placeholder="CLÉ PRIVÉE">
            <button onclick="handleSetup()">GÉNÉRER L'ACCÈS</button>
        </div>

        <div id="login-section" class="hidden">
            <p class="status">> OPÉRATEUR DÉTECTÉ : <span id="user-detected" style="color:#fff"></span></p>
            <input type="password" id="login-password" placeholder="ENTREZ VOTRE CLÉ">
            <button onclick="handleLogin()">DÉVERROUILLER</button>
        </div>

        <div id="user-menu" class="hidden">
            <p class="status">> ACCÈS SOUVERAIN : <span id="display-name" style="color:#fff"></span></p>
            <div class="line"></div>
            <label style="font-size: 0.7rem; color: #aaa;">PUISSANCE D'IMPULSION (i128):</label>
            <input type="number" id="energy-input" value="128">
            <button onclick="runVorthSim()">LANCER LA PREUVE</button>
            <div id="sim-result" class="hidden">
                <canvas id="vorth-canvas" width="350" height="100"></canvas>
                <p id="calc-result" style="font-size: 0.8rem; color: #fff; background: rgba(0,50,0,0.5); padding: 5px;"></p>
            </div>
            <button onclick="logout()" class="logout">RÉINITIALISER LE NOEUD</button>
        </div>
    </div>

    <script>
        const CURRENT_VER = "1.5";

        // MOTEUR DE CRYPTAGE VORTH
        async function vorthEncrypt(data) {
            let h = "";
            for (let i = 0; i < data.length; i++) {
                // Algorithme i128
                h += Math.abs((data.charCodeAt(i) * 128) ^ (i + 128)).toString(16);
            }
            return "v128_s" + h;
        }

        window.onload = function() {
            // Nettoyage automatique si version obsolète
            if (localStorage.getItem('vorth_ver') !== CURRENT_VER) {
                localStorage.clear();
                localStorage.setItem('vorth_ver', CURRENT_VER);
                location.reload();
                return;
            }
            const name = localStorage.getItem('vorth_name');
            if (name) {
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('user-detected').innerText = name.toUpperCase();
            } else {
                document.getElementById('setup-section').classList.remove('hidden');
            }
        };

        async function handleSetup() {
            const n = document.getElementById('new-username').value.trim();
            const p = document.getElementById('new-password').value;
            if (n && p) {
                localStorage.setItem('vorth_name', n);
                localStorage.setItem('vorth_key', await vorthEncrypt(p));
                location.reload();
            }
        }

        async function handleLogin() {
            const p = document.getElementById('login-password').value;
            const s = localStorage.getItem('vorth_key');
            if (await vorthEncrypt(p) === s) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('user-menu').classList.remove('hidden');
                document.getElementById('display-name').innerText = localStorage.getItem('vorth_name').toUpperCase();
            } else { alert("ACCÈS REFUSÉ : SIGNATURE INCORRECTE"); }
        }

        function runVorthSim() {
            const e = document.getElementById('energy-input').value;
            document.getElementById('sim-result').classList.remove('hidden');
            const c = document.getElementById('vorth-canvas');
            const ctx = c.getContext('2d');
            ctx.clearRect(0,0,c.width,c.height);
            let x = 0;
            
            function anim() {
                if(x < c.width) {
                    ctx.beginPath();
                    ctx.strokeStyle = '#0f0';
                    ctx.lineWidth = 2;
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = '#0f0';
                    // Équation de mouvement énergétique
                    ctx.moveTo(x, 50 + Math.sin(x * 0.1) * (e / 8));
                    x += 4;
                    ctx.lineTo(x, 50 + Math.sin(x * 0.1) * (e / 8));
                    ctx.stroke();
                    requestAnimationFrame(anim);
                } else {
                    const result = (e * 1.128).toFixed(4);
                    document.getElementById('calc-result').innerHTML = "> MOMENT CRÉÉ : " + result + " Vorth-Units<br>> STABILITÉ : 100% (SOUVERAIN)";
                }
            }
            anim();
        }

        function logout() { if(confirm("Voulez-vous vraiment réinitialiser ce nœud ?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
